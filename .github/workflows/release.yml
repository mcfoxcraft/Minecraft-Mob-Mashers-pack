name: Release resource pack

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read SHA-1 from committed sidecar
        id: zip
        run: |
          if [ ! -f dist/foxmobmashers-resourcepack.zip ]; then
            echo "::error::dist/foxmobmashers-resourcepack.zip is missing — commit it before tagging."
            exit 1
          fi
          echo "sha1=$(cat dist/foxmobmashers-resourcepack.zip.sha1)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/foxmobmashers-resourcepack.zip
            dist/foxmobmashers-resourcepack.zip.sha1
          body: |
            **SHA-1:** `${{ steps.zip.outputs.sha1 }}`

            Two URLs — same zip, same hash, pick whichever is faster for your region:

            **jsDelivr CDN** (recommended — global Cloudflare/Fastly CDN):
            ```
            https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/dist/foxmobmashers-resourcepack.zip
            ```

            **GitHub Releases** (direct):
            ```
            ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/foxmobmashers-resourcepack.zip
            ```

            Drop in your server's `plugins/FoxMobMashers/config.yml`:

            ```yaml
            resource_pack:
              url: "https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/dist/foxmobmashers-resourcepack.zip"
              sha1: "${{ steps.zip.outputs.sha1 }}"
              required: false
            ```

            Clients cache packs by hash — bump both values after each release.
